Những điểm cần lưu ý trong bài tập này:
    - section co noi dung, ý nghĩa rõ ràng, có tiêu đề nội dung nên khi code có thể ưu tiên sử dụng,
    - div dung để chia các vùng, ô trên màn hình web
    - css đầu luôn phải đặt trước
        1 Reset mặc định trước( ví dụ * {margin: 0;padding: 0;box sizing: border box;})
        2 Sau đó tới css tổng thể cho body (Ví dụ front-family, front-size,color)
        3 Tiếp theo là các layout lớn nhất như: section, container...
        4 Sau đó là các layout từ lớn tới bé.
        5 Nếu có hiệu ứng dùng mã giả thì là bước cuối trong css.
Các thẻ cần quan tâm:
    - Để căn giữa màn hình cho section cần dùng thẻ align item: căn theo chiều dọc justify-content là chiều ngang.
    - Trước khi căn giữa cần xác định chiều cao của khối
    - Xác đinhk display trước khi thực hiện
